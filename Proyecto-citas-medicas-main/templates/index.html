<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Citas Médicas</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f8;
            color: #222;
        }

        header {
            background: #2563eb;
            color: white;
            padding: 20px;
            text-align: center;
        }

        main {
            padding: 25px;
        }

        h2 {
            margin-top: 30px;
        }

        .filtros {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        input, select, button {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            cursor: pointer;
            background: #2563eb;
            color: white;
            border: none;
        }

        button:hover {
            background: #1e40af;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 15px;
        }

        .tarjeta {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .tarjeta h3 {
            margin-top: 0;
            color: #2563eb;
        }

        .paginacion {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .estado-activo {
            color: green;
            font-weight: bold;
        }

        .estado-inactivo {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    <h1>Sistema de Gestión de Citas Médicas</h1>
</header>

<main>

    <section>
        <h2>Pacientes</h2>

        <div class="filtros">
            <input
                type="text"
                id="buscarPaciente"
                placeholder="Buscar paciente por nombre"
            >

            <select id="estadoPaciente">
                <option value="">Todos</option>
                <option value="ACTIVO">Activos</option>
                <option value="INACTIVO">Inactivos</option>
            </select>

            <button onclick="filtrarPacientes()">Filtrar</button>
            <button onclick="limpiarFiltrosPacientes()">Limpiar</button>
        </div>

        <div id="contenedorPacientes" class="grid"></div>

        <div class="paginacion">
            <button onclick="paginaAnteriorPacientes()">Anterior</button>
            <span id="paginaPacientes">Página 1</span>
            <button onclick="paginaSiguientePacientes()">Siguiente</button>
        </div>
    </section>

</main>

<script>
    let offsetPacientes = 0;
    const limitPacientes = 12;
    let paginaActualPacientes = 1;
    let modoPacientes = "normal";

    async function cargarPacientes() {
        let url = "";

        const nombre = document.getElementById("buscarPaciente").value.trim();
        const estado = document.getElementById("estadoPaciente").value;

        if (modoPacientes === "buscar" && nombre) {
            url = `/pacientes/buscar/?nombre=${encodeURIComponent(nombre)}&offset=${offsetPacientes}&limit=${limitPacientes}`;
        } else if (modoPacientes === "filtrar" && estado) {
            url = `/pacientes/filtrar/?estado=${estado}&offset=${offsetPacientes}&limit=${limitPacientes}`;
        } else {
            url = `/pacientes?offset=${offsetPacientes}&limit=${limitPacientes}`;
        }

        const respuesta = await fetch(url);
        const pacientes = await respuesta.json();

        renderPacientes(pacientes);
    }

    function renderPacientes(pacientes) {
        const contenedor = document.getElementById("contenedorPacientes");
        contenedor.innerHTML = "";

        if (!pacientes || pacientes.length === 0) {
            contenedor.innerHTML = "<p>No hay pacientes para mostrar.</p>";
            return;
        }

        pacientes.forEach(paciente => {
            const tarjeta = document.createElement("div");
            tarjeta.className = "tarjeta";

            const estadoClase = paciente.estado === "ACTIVO"
                ? "estado-activo"
                : "estado-inactivo";

            tarjeta.innerHTML = `
                <h3>${paciente.nombre}</h3>
                <p><strong>ID:</strong> ${paciente.id}</p>
                <p><strong>Documento:</strong> ${paciente.documento}</p>
                <p><strong>Teléfono:</strong> ${paciente.telefono}</p>
                <p><strong>Estado:</strong> <span class="${estadoClase}">${paciente.estado}</span></p>
            `;

            contenedor.appendChild(tarjeta);
        });

        document.getElementById("paginaPacientes").innerText = `Página ${paginaActualPacientes}`;
    }

    async function filtrarPacientes() {
        const nombre = document.getElementById("buscarPaciente").value.trim();
        const estado = document.getElementById("estadoPaciente").value;

        offsetPacientes = 0;
        paginaActualPacientes = 1;

        if (nombre) {
            modoPacientes = "buscar";
        } else if (estado) {
            modoPacientes = "filtrar";
        } else {
            modoPacientes = "normal";
        }

        await cargarPacientes();
    }

    async function limpiarFiltrosPacientes() {
        document.getElementById("buscarPaciente").value = "";
        document.getElementById("estadoPaciente").value = "";

        offsetPacientes = 0;
        paginaActualPacientes = 1;
        modoPacientes = "normal";

        await cargarPacientes();
    }

    async function paginaSiguientePacientes() {
        offsetPacientes += limitPacientes;
        paginaActualPacientes += 1;

        await cargarPacientes();
    }

    async function paginaAnteriorPacientes() {
        if (offsetPacientes === 0) return;

        offsetPacientes -= limitPacientes;
        paginaActualPacientes -= 1;

        await cargarPacientes();
    }

    document.addEventListener("DOMContentLoaded", cargarPacientes);
</script>

</body>
</html>
